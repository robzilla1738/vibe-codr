name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin to the repo's packageManager so CI matches local; `latest` can
          # drift and mask a Bun-version-specific break.
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      # Exercise the standalone-binary path that PROVIDER_MODULES exists to keep
      # self-contained — otherwise a broken `bun build --compile` ships unnoticed.
      - run: bun run build:binary
      - run: ./dist/vibecodr --version
      # Drive the real OpenTUI app with a mock engine (the only render/input check).
      - run: bun run smoke:tui
