name: Release

# Tag-driven: push `vX.Y.Z` (or `vX.Y.Z-rc.N` for a dry run) to cut a release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

jobs:
  # Cross-compile the standalone binaries. Bun compiles every target from Linux,
  # so one runner produces them all. Flags mirror the `build:binary` script
  # (bun build --compile … --outfile) plus the cross-compilation --target; no
  # --external, so the PROVIDER_MODULES literal imports stay bundle-visible.
  # `ext` is the output suffix (`.exe` for Windows; empty/absent elsewhere — an
  # unset matrix key expands to ""). Windows is EXPERIMENTAL/hand-unverified.
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { target: bun-darwin-arm64, os: darwin, arch: arm64 }
          - { target: bun-darwin-x64, os: darwin, arch: x64 }
          - { target: bun-linux-x64, os: linux, arch: x64 }
          - { target: bun-linux-arm64, os: linux, arch: arm64 }
          - { target: bun-windows-x64, os: windows, arch: x64, ext: .exe }
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      # Install first (frozen), THEN stamp the version — stamping only rewrites
      # version strings, so it must not run before a frozen install.
      - run: bun install --frozen-lockfile
      - run: bun scripts/release/set-version.ts
      - name: Compile ${{ matrix.target }}
        run: |
          bun build --compile --target=${{ matrix.target }} \
            packages/cli/bin/vibecodr.ts \
            --outfile vibecodr-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
      # Worker sibling (the freeze fix — engine runs in a worker on the TUI
      # path). Mirrors main binary compile, just from the worker entry. A user
      # who installs just `vibecodr-…` falls back to in-process `Engine` +
      # Option B's yield gate alone — still substantially improves the freeze.
      - name: Compile ${{ matrix.target }} (engine worker)
        run: |
          bun build --compile --target=${{ matrix.target }} \
            packages/cli/src/engine-worker-entry.ts \
            --outfile vibecodr-engine-worker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
      # Pre-compiled TUI app (Solid JSX -> JS bundle). The non-literal dynamic
      # import in tui.ts keeps app.tsx out of the compiled binary; this ships
      # a sibling the binary can import at runtime.
      - name: Build TUI app bundle
        run: |
          bun scripts/release/build-app.ts vibecodr-app-${{ matrix.os }}-${{ matrix.arch }}.js
      - name: Per-file checksum
        run: |
          sha256sum vibecodr-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} > vibecodr-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256
          sha256sum vibecodr-engine-worker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} > vibecodr-engine-worker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256
          sha256sum vibecodr-app-${{ matrix.os }}-${{ matrix.arch }}.js > vibecodr-app-${{ matrix.os }}-${{ matrix.arch }}.js.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            vibecodr-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
            vibecodr-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256
            vibecodr-engine-worker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
            vibecodr-engine-worker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256
            vibecodr-app-${{ matrix.os }}-${{ matrix.arch }}.js
            vibecodr-app-${{ matrix.os }}-${{ matrix.arch }}.js.sha256

  # Build + publish the npm/bun package. A tag containing `-rc` publishes NOTHING
  # (dry-run only), so a release candidate can exercise the whole path safely.
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun scripts/release/set-version.ts
      - run: bun scripts/release/build-npm.ts
      - name: Publish to npm
        working-directory: dist/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-rc* ]]; then
            echo "Release candidate ${GITHUB_REF_NAME} — dry run only, not publishing."
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi

  # Assemble the GitHub Release: all binaries + an aggregate SHA256SUMS, with the
  # body pulled from this tag's CHANGELOG section.
  release:
    needs: [binaries, npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      # Promote the CHANGELOG (Unreleased → this version) so the notes extractor
      # finds the section for the tag.
      - run: bun scripts/release/set-version.ts
      - name: Download binary artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "binary-*" \
            --dir artifacts-download
          mkdir -p artifacts
          find artifacts-download -maxdepth 2 -type f -exec mv {} artifacts/ \;
      - name: Aggregate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum vibecodr-darwin-arm64 vibecodr-darwin-x64 \
                    vibecodr-linux-x64 vibecodr-linux-arm64 \
                    vibecodr-windows-x64.exe \
                    vibecodr-engine-worker-darwin-arm64 vibecodr-engine-worker-darwin-x64 \
                    vibecodr-engine-worker-linux-x64 vibecodr-engine-worker-linux-arm64 \
                    vibecodr-engine-worker-windows-x64.exe > SHA256SUMS
          cat SHA256SUMS
      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          bun -e 'const { extractChangelogSection } = await import("./scripts/release/set-version.ts"); const { readFileSync } = await import("node:fs"); const ver = (process.env.RELEASE_TAG || "").replace(/^v/, ""); process.stdout.write(extractChangelogSection(readFileSync("CHANGELOG.md", "utf8"), ver) || "See CHANGELOG.md.");' > RELEASE_NOTES.md
          cat RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          [[ "${GITHUB_REF_NAME}" == *-rc* ]] && PRERELEASE="--prerelease"
          gh release create "${GITHUB_REF_NAME}" $PRERELEASE \
            --title "vibe-codr ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            artifacts/vibecodr-darwin-arm64 \
            artifacts/vibecodr-darwin-x64 \
            artifacts/vibecodr-linux-x64 \
            artifacts/vibecodr-linux-arm64 \
            artifacts/vibecodr-windows-x64.exe \
            artifacts/vibecodr-engine-worker-darwin-arm64 \
            artifacts/vibecodr-engine-worker-darwin-x64 \
            artifacts/vibecodr-engine-worker-linux-x64 \
            artifacts/vibecodr-engine-worker-linux-arm64 \
            artifacts/vibecodr-engine-worker-windows-x64.exe \
            artifacts/SHA256SUMS
