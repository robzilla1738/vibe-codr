name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Verify unified version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for MANIFEST in package.json packages/*/package.json apps/desktop/package.json; do
            test "$(node -p "require('./$MANIFEST').version")" = "$VERSION"
          done
          test "$(node -p "require('./apps/desktop/package-lock.json').version")" = "$VERSION"
          test "$(sed -n 's/^export const VERSION = "\([^"]*\)";$/\1/p' packages/cli/src/version.ts)" = "$VERSION"
          ENGINE_COMMIT="$(tr -d '[:space:]' < apps/desktop/ENGINE_COMMIT)"
          git merge-base --is-ancestor "$ENGINE_COMMIT" "$GITHUB_SHA" || {
            echo "ENGINE_COMMIT must be an ancestor of the release tag" >&2
            exit 1
          }

  cli-binaries:
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: bun-darwin-arm64, os: darwin, arch: arm64, runner: macos-14, archive: tar.gz }
          - { target: bun-darwin-x64, os: darwin, arch: x64, runner: macos-15-intel, archive: tar.gz }
          - { target: bun-linux-x64, os: linux, arch: x64, runner: ubuntu-24.04, archive: tar.gz }
          - { target: bun-linux-arm64, os: linux, arch: arm64, runner: ubuntu-24.04-arm, archive: tar.gz }
          - { target: bun-windows-x64, os: windows, arch: x64, runner: windows-2025, archive: zip }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Build and smoke platform-complete CLI
        run: |
          bun scripts/release/build-standalone.ts dist/standalone/vibe-codr --target=${{ matrix.target }}
      - name: Archive standalone CLI
        if: runner.os != 'Windows'
        run: tar -C dist/standalone -czf vibe-codr-${{ matrix.os }}-${{ matrix.arch }}.tar.gz vibe-codr
      - name: Archive standalone CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/standalone/vibe-codr -DestinationPath vibe-codr-${{ matrix.os }}-${{ matrix.arch }}.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: vibe-codr-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.archive }}
          if-no-files-found: error

  npm-package:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun scripts/release/build-npm.ts
      - run: mkdir -p dist/release && npm pack ./dist/npm --pack-destination dist/release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-package
          path: dist/release/*.tgz
          if-no-files-found: error

  cloud-runtime:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: git worktree add --detach .engine "$(tr -d '[:space:]' < apps/desktop/ENGINE_COMMIT)"
      - name: Build and smoke locked runtime
        working-directory: .engine
        run: |
          bun install --frozen-lockfile
          VIBE_ENGINE_COMMIT="$(git rev-parse HEAD)" bun run build:cloud-runtime
          bun run smoke:cloud-runtime
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cloud-runtime
          path: .engine/dist/cloud-runtime/vibe-cloud-runtime-*
          if-no-files-found: error

  desktop-macos:
    needs: [version, cloud-runtime]
    runs-on: macos-14
    timeout-minutes: 50
    environment: release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Build locked engine host
        run: |
          git worktree add --detach .engine "$(tr -d '[:space:]' < apps/desktop/ENGINE_COMMIT)"
          cd .engine
          bun install --frozen-lockfile
          bun run build:macos-bridge
      - run: npm ci
        working-directory: apps/desktop
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cloud-runtime
          path: .artifacts/cloud-runtime
      - name: Verify desktop release source
        run: npm run verify:ci
        working-directory: apps/desktop
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/.engine
      - name: Prepare notarization key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          test -n "$APPLE_API_KEY_P8"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
      - name: Build, sign, and notarize
        working-directory: apps/desktop
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/.engine
          VIBE_CLOUD_RUNTIME_DIR: ${{ github.workspace }}/.artifacts/cloud-runtime
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run dist:mac -- --config.mac.notarize=true --config.forceCodeSigning=true
      - name: Staple and validate
        working-directory: apps/desktop
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          DMG_PATH="$(find release -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$DMG_PATH"
          codesign --verify --deep --strict --verbose=2 "release/mac-arm64/Vibe Codr.app"
          spctl --assess --type execute --verbose=2 "release/mac-arm64/Vibe Codr.app"
          xcrun stapler validate "release/mac-arm64/Vibe Codr.app"
          xcrun stapler validate "$DMG_PATH"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-macos
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error

  desktop-windows:
    needs: [version, cloud-runtime]
    runs-on: windows-2025
    timeout-minutes: 50
    environment: release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Build locked Windows engine host
        shell: pwsh
        run: |
          $revision = (Get-Content apps/desktop/ENGINE_COMMIT -Raw).Trim()
          git worktree add --detach .engine $revision
          Push-Location .engine
          bun install --frozen-lockfile
          bun run build:macos-bridge
          if (Test-Path dist/vibecodr-engine-host) { Move-Item dist/vibecodr-engine-host dist/vibecodr-engine-host.exe }
          if (!(Test-Path dist/vibecodr-engine-host.exe)) { throw "Windows engine host was not produced" }
          Pop-Location
      - run: npm ci
        working-directory: apps/desktop
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cloud-runtime
          path: .artifacts/cloud-runtime
      - name: Verify and package
        working-directory: apps/desktop
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}\.engine
          VIBE_CLOUD_RUNTIME_DIR: ${{ github.workspace }}\.artifacts\cloud-runtime
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          FORCE_CODE_SIGNING: ${{ secrets.WIN_CSC_LINK != '' }}
        run: |
          npm run lint
          npm run verify:source-parity
          npm run verify:config-shape
          npm run typecheck
          npm run build
          npm run verify:bundle
          npm run smoke:bridge
          npm run dist:win -- --config.forceCodeSigning=$env:FORCE_CODE_SIGNING
      - name: Validate installer
        working-directory: apps/desktop
        shell: pwsh
        env:
          FORCE_CODE_SIGNING: ${{ secrets.WIN_CSC_LINK != '' }}
        run: |
          $installer = @(Get-ChildItem release -File -Filter *.exe)
          if ($installer.Count -ne 1) { throw "Expected one NSIS installer" }
          if (!(Test-Path release/latest.yml)) { throw "Missing Windows update metadata" }
          if ($env:FORCE_CODE_SIGNING -eq "true") {
            if ((Get-AuthenticodeSignature $installer[0].FullName).Status -ne "Valid") { throw "Invalid Windows signature" }
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml
          if-no-files-found: error

  publish:
    needs: [version, cli-binaries, npm-package, cloud-runtime, desktop-macos, desktop-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: cli-*
          path: release-assets
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-package
          path: release-assets
      - name: Build checksums and release notes
        run: |
          cd release-assets
          printf '%s\n' "$GITHUB_SHA" > SOURCE_COMMIT
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          cd ..
          bun -e 'const { extractChangelogSection } = await import("./scripts/release/set-version.ts"); const { readFileSync } = await import("node:fs"); process.stdout.write(extractChangelogSection(readFileSync("CHANGELOG.md", "utf8"), process.env.VERSION) || "See CHANGELOG.md.");' > RELEASE_NOTES.md
        env:
          VERSION: ${{ github.ref_name }}
      - name: Prepare draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          [[ "${GITHUB_REF_NAME#v}" == *-* ]] && PRERELEASE="--prerelease"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = "true" || {
              echo "Refusing to replace assets on an already-public release" >&2
              exit 1
            }
            mkdir -p existing-release
            gh release download "$GITHUB_REF_NAME" --pattern SOURCE_COMMIT --dir existing-release
            test "$(tr -d '[:space:]' < existing-release/SOURCE_COMMIT)" = "$GITHUB_SHA" || {
              echo "Refusing to resume a draft created from a different source commit" >&2
              exit 1
            }
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
            gh release edit "$GITHUB_REF_NAME" $PRERELEASE --title "Vibe Codr $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
          else
            gh release create "$GITHUB_REF_NAME" $PRERELEASE --draft release-assets/* --verify-tag --title "Vibe Codr $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
          fi
      - name: Publish npm only after every product gate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE="$(find "$GITHUB_WORKSPACE/release-assets" -maxdepth 1 -name 'vibe-codr-*.tgz' -print -quit)"
          test -n "$PACKAGE"
          if npm view "vibe-codr@$VERSION" version >/dev/null 2>&1; then
            LOCAL_INTEGRITY="$(node -e 'const { createHash } = require("node:crypto"); const { readFileSync } = require("node:fs"); process.stdout.write(`sha512-${createHash("sha512").update(readFileSync(process.argv[1])).digest("base64")}`);' "$PACKAGE")"
            REMOTE_INTEGRITY="$(npm view "vibe-codr@$VERSION" dist.integrity)"
            test "$LOCAL_INTEGRITY" = "$REMOTE_INTEGRITY" || {
              echo "Existing npm package does not match this release artifact" >&2
              exit 1
            }
            echo "vibe-codr@$VERSION matches the local package; continuing idempotently"
          elif [[ "$VERSION" == *-* ]]; then
            npm publish "$PACKAGE" --access public --tag next
          else
            npm publish "$PACKAGE" --access public
          fi
      - name: Publish one Vibe Codr release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
