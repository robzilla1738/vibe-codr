<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — My Simple Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #181b21;
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.75rem;
      color: #7dd3fc;
    }
    p { line-height: 1.6; color: #a0a8b3; margin-bottom: 1.25rem; }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    footer { margin-top: 2rem; font-size: 0.85rem; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>About</h1>
    <p>This is a small demo site built with a single HTML file and inline CSS. It exists to show how a lightweight, dependency-free page can be put together — no frameworks, no build step, just markup and a little style served straight to the browser.</p>
    <a class="btn" href="index.html">← Back home</a>
  </div>
  <footer>Built with plain HTML &amp; CSS</footer>
</body>
</html>
