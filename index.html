<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪐 Cosmic Tour — The Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #05060f;
      --panel: #0e1024;
      --border: #232852;
      --text: #d8dcf5;
      --muted: #8a90b8;
      --accent: #7dd3fc;
      --accent2: #c084fc;
      --gold: #fbbf24;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---------- starfield ---------- */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    main { position: relative; z-index: 1; }

    /* ---------- hero ---------- */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .sun {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff6cf, #fbbf24 40%, #f97316 75%, #b45309);
      box-shadow: 0 0 60px 20px rgba(251, 191, 36, 0.45),
                  0 0 120px 60px rgba(249, 115, 22, 0.25);
      animation: pulse 4s ease-in-out infinite;
      margin-bottom: 2.5rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .hero h1 {
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(120deg, var(--accent), var(--accent2), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    .hero p {
      max-width: 540px;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .scroll-cue {
      color: var(--muted);
      font-size: 0.85rem;
      animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(8px); opacity: 1; }
    }

    /* ---------- planets grid ---------- */
    .planets {
      max-width: 980px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    .planets h2 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 2.5rem;
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      cursor: pointer;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(125, 211, 252, 0.15);
    }

    .planet-visual {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
    }
    .card .tag {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card p {
      font-size: 0.92rem;
      line-height: 1.55;
      color: var(--muted);
    }
    .card .stat {
      margin-top: 0.9rem;
      font-size: 0.8rem;
      color: var(--accent2);
    }

    /* ---------- planet colors ---------- */
    .mercury { background: radial-gradient(circle at 30% 30%, #c4b8a8, #8a7c6e 60%, #5b5145); }
    .venus   { background: radial-gradient(circle at 30% 30%, #fde8b0, #e0a96d 55%, #a86a2f); }
    .earth   { background: radial-gradient(circle at 30% 30%, #6ab7ff, #2563eb 55%, #1e3a8a); }
    .mars    { background: radial-gradient(circle at 30% 30%, #f4a98a, #c2410c 55%, #7c2d12); }
    .jupiter { background: radial-gradient(circle at 30% 30%, #f0d8b0, #ca9b6b 50%, #8b6f4d);
               box-shadow: inset -6px 0 12px rgba(0,0,0,0.3); }
    .saturn  { background: radial-gradient(circle at 30% 30%, #f5e3b8, #d4a84b 55%, #92702a); }
    .uranus  { background: radial-gradient(circle at 30% 30%, #b5f0f0, #67cfd6 55%, #2c8b91); }
    .neptune { background: radial-gradient(circle at 30% 30%, #8fa3ff, #3b5bdb 55%, #1e2a78); }

    /* ---------- modal ---------- */
    .modal-bg {
      position: fixed; inset: 0; z-index: 10;
      background: rgba(2, 3, 10, 0.8);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      max-width: 460px;
      width: 100%;
      animation: rise 0.3s ease;
    }
    @keyframes rise { from { transform: translateY(20px); opacity: 0; } }
    .modal .planet-visual { width: 80px; height: 80px; }
    .modal h3 { font-size: 1.5rem; margin-bottom: 0.2rem; }
    .modal .tag { color: var(--muted); margin-bottom: 1rem; }
    .modal p { line-height: 1.6; color: var(--muted); margin-bottom: 1rem; }
    .facts { list-style: none; }
    .facts li {
      padding: 0.5rem 0;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
    }
    .facts li span:first-child { color: var(--muted); }
    .facts li span:last-child { color: var(--accent); font-weight: 600; }
    .close {
      margin-top: 1.5rem;
      width: 100%;
      background: var(--border);
      color: var(--text);
      border: none;
      padding: 0.7rem;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .close:hover { background: #2e3568; }

    /* ---------- footer ---------- */
    footer {
      text-align: center;
      padding: 2rem;
      color: #4a4f6e;
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 560px) {
      .hero h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <main>
    <!-- HERO -->
    <section class="hero">
      <div class="sun"></div>
      <h1>Cosmic Tour</h1>
      <p>Take a quick trip through our solar system. Click any planet to dive deeper into its world.</p>
      <div class="scroll-cue">↓ scroll to explore</div>
    </section>

    <!-- PLANETS -->
    <section class="planets" id="planets">
      <h2>The Eight Worlds</h2>
      <div class="grid" id="grid"></div>
    </section>

    <footer>
      Made with plain HTML, CSS &amp; JS · Data from
      <a href="https://solarsystem.nasa.gov/" target="_blank" rel="noopener">NASA</a> · 🌌
    </footer>
  </main>

  <!-- MODAL -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="planet-visual" id="mVisual"></div>
      <h3 id="mName"></h3>
      <div class="tag" id="mTag"></div>
      <p id="mDesc"></p>
      <ul class="facts" id="mFacts"></ul>
      <button class="close" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    const PLANETS = [
      {
        name: "Mercury", tag: "The Swift", cls: "mercury",
        desc: "The smallest planet and closest to the Sun. Mercury races around its orbit in just 88 days, enduring scorching days and freezing nights.",
        facts: { "Distance from Sun": "57.9M km", "Day length": "59 Earth days", "Moons": "0", "Surface temp": "-173 to 427°C" }
      },
      {
        name: "Venus", tag: "The Morning Star", cls: "venus",
        desc: "Earth's scorching twin, wrapped in a thick toxic atmosphere that traps heat. Venus is the hottest planet in the solar system.",
        facts: { "Distance from Sun": "108.2M km", "Day length": "243 Earth days", "Moons": "0", "Surface temp": "464°C" }
      },
      {
        name: "Earth", tag: "The Blue Marble", cls: "earth",
        desc: "Our home — the only world known to harbor life. Liquid water oceans, a protective magnetic field, and a breathable atmosphere make it unique.",
        facts: { "Distance from Sun": "149.6M km", "Day length": "24 hours", "Moons": "1", "Surface temp": "-88 to 58°C" }
      },
      {
        name: "Mars", tag: "The Red Planet", cls: "mars",
        desc: "A cold desert world half the size of Earth, home to the tallest volcano and deepest canyon in the solar system. A prime target for exploration.",
        facts: { "Distance from Sun": "227.9M km", "Day length": "24.6 hours", "Moons": "2", "Surface temp": "-153 to 20°C" }
      },
      {
        name: "Jupiter", tag: "The Giant", cls: "jupiter",
        desc: "The largest planet — a massive ball of gas with a Great Red Spot storm that has raged for centuries. Jupiter has more than 90 moons.",
        facts: { "Distance from Sun": "778.5M km", "Day length": "9.9 hours", "Moons": "95+", "Diameter": "142,984 km" }
      },
      {
        name: "Saturn", tag: "The Ringed Beauty", cls: "saturn",
        desc: "Famous for its dazzling ring system made of ice and rock. Saturn is so light it would float in water — if you could find a big enough bathtub.",
        facts: { "Distance from Sun": "1.43B km", "Day length": "10.7 hours", "Moons": "146", "Ring span": "282,000 km" }
      },
      {
        name: "Uranus", tag: "The Tilted World", cls: "uranus",
        desc: "An ice giant that spins on its side, likely knocked over by an ancient collision. Its pale blue-green hue comes from methane in the atmosphere.",
        facts: { "Distance from Sun": "2.87B km", "Day length": "17.2 hours", "Moons": "28", "Axial tilt": "98°" }
      },
      {
        name: "Neptune", tag: "The Windy Deep", cls: "neptune",
        desc: "The farthest planet from the Sun — a deep blue ice giant with the fastest winds in the solar system, reaching 2,100 km/h.",
        facts: { "Distance from Sun": "4.5B km", "Day length": "16 hours", "Moons": "16", "Max wind": "2,100 km/h" }
      }
    ];

    // build cards
    const grid = document.getElementById("grid");
    PLANETS.forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="planet-visual ${p.cls}"></div>
        <h3>${p.name}</h3>
        <div class="tag">${p.tag}</div>
        <p>${p.desc.slice(0, 90)}…</p>
        <div class="stat">Tap to explore →</div>
      `;
      card.onclick = () => openModal(i);
      grid.appendChild(card);
    });

    // modal
    function openModal(i) {
      const p = PLANETS[i];
      document.getElementById("mVisual").className = "planet-visual " + p.cls;
      document.getElementById("mName").textContent = p.name;
      document.getElementById("mTag").textContent = p.tag;
      document.getElementById("mDesc").textContent = p.desc;
      const facts = document.getElementById("mFacts");
      facts.innerHTML = "";
      for (const [k, v] of Object.entries(p.facts)) {
        facts.innerHTML += `<li><span>${k}</span><span>${v}</span></li>`;
      }
      document.getElementById("modalBg").classList.add("open");
    }
    function closeModal() {
      document.getElementById("modalBg").classList.remove("open");
    }
    document.getElementById("modalBg").addEventListener("click", e => {
      if (e.target.id === "modalBg") closeModal();
    });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    // ---- animated starfield ----
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      stars = Array.from({ length: Math.floor(innerWidth * innerHeight / 6000) }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * 0.8 + 0.2,
        tw: Math.random() * Math.PI * 2
      }));
    }
    resize();
    addEventListener("resize", resize);

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        s.tw += 0.04;
        const a = 0.4 + Math.sin(s.tw) * 0.3;
        ctx.globalAlpha = a * s.z;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(s.x, s.y, s.z * 1.6, s.z * 1.6);
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(drawStars);
    }
    drawStars();
  </script>
</body>
</html>
